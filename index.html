<!DOCTYPE html>

<html lang="uk" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Міні-Апп | Меню</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;600&family=Cormorant:wght@600&family=Inter+Tight:wght@400;600&family=Inter:wght@400;600&family=Marmelad&family=Montserrat+Alternates:wght@400;600&family=Montserrat:wght@400;600&family=Mulish:wght@400;700&family=Prata&family=Roboto+Flex:opsz,wght@8..144,400;8..144,600&family=Unbounded:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
    /* ===================== ТЕМИ ===================== */

    :root[data-theme="dark"] {
        --bg-color: #121212;
        --surface-color: #1E1E1E;
        --text-primary: #FFFFFF;
        --text-secondary: #999999;
        --price-bg: rgba(255, 255, 255, 0.1);
        --item-border: #333;
        --settings-bg: #222;
        --settings-border: #444;
        --summary-accent-opacity: 0.10;
    }

    :root[data-theme="light"] {
        --bg-color: #EFEFED;
        --surface-color: #FFFFFF;
        --text-primary: #111111;
        --text-secondary: #777777;
        --price-bg: rgba(0, 0, 0, 0.07);
        --item-border: #E0E0E0;
        --settings-bg: #FFFFFF;
        --settings-border: #E0E0E0;
        --summary-accent-opacity: 0.12;
    }

    :root[data-theme="kraft"] {
        --bg-color: #1A1208;
        --surface-color: #241910;
        --text-primary: #F0DFC0;
        --text-secondary: #8A7355;
        --price-bg: rgba(240, 223, 192, 0.1);
        --item-border: #3D2E18;
        --settings-bg: #2A1F12;
        --settings-border: #4A3828;
        --summary-accent-opacity: 0.12;
    }

    /* ===================== БАЗОВІ СТИЛІ ===================== */

    :root {
        --font-main: 'Unbounded', sans-serif;
        --accent-color: #DEFF9A;
        --border-radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
        font-family: var(--font-main);
        background-color: var(--bg-color);
        color: var(--text-primary);
        padding: 20px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        font-synthesis: none;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        transition: background-color 0.3s ease, color 0.3s ease;
    }

    .main-content { flex: 1; }
    .material-symbols-rounded { vertical-align: middle; color: var(--accent-color); }

    .header {
        display: flex; align-items: center; justify-content: space-between;
        background: var(--surface-color); padding: 15px 20px;
        border-radius: var(--border-radius); margin-bottom: 24px;
        transition: background-color 0.3s ease;
    }
    .header-info { display: flex; align-items: center; gap: 15px; }
    .logo { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; background-color: #333; }
    .business-name { font-size: 16px; font-weight: 600; outline: none; }
    
    .action-btn {
        background: rgba(255, 255, 255, 0.1); border: none; border-radius: 50%;
        width: 40px; height: 40px; display: none; align-items: center;
        justify-content: center; cursor: pointer; color: #fff;
    }

    .section-title {
        font-size: 20px; font-weight: 600; margin-bottom: 16px;
        display: flex; align-items: center; gap: 8px; outline: none;
    }

    /* ===================== КАТЕГОРІЇ — АКЦЕНТ ===================== */

    details {
        background: var(--surface-color);
        border-radius: var(--border-radius);
        margin-bottom: 12px;
        overflow: hidden;
        transition: background-color 0.3s ease;
    }

    summary {
        padding: 18px 20px 18px 16px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        list-style: none;
        display: flex;
        justify-content: space-between;
        align-items: center;
        outline: none;

        /* Ось де магія — ліва смуга + градієнт на основі accent-color */
        border-left: 4px solid var(--accent-color);
        background: linear-gradient(
            90deg,
            color-mix(in srgb, var(--accent-color) 10%, transparent) 0%,
            transparent 55%
        );
        transition: background 0.3s ease;
    }

    /* Fallback для Safari/старих браузерів де color-mix не підтримується */
    @supports not (background: color-mix(in srgb, red 10%, transparent)) {
        summary {
            background: linear-gradient(
                90deg,
                rgba(222, 255, 154, var(--summary-accent-opacity)) 0%,
                transparent 55%
            );
        }
    }

    summary::-webkit-details-marker { display: none; }
    summary::after {
        content: '\e313';
        font-family: 'Material Symbols Rounded';
        color: var(--accent-color);
        font-size: 24px;
        transition: transform 0.3s ease;
        flex-shrink: 0;
    }
    details[open] summary::after { transform: rotate(180deg); }

    .items-list { padding: 0 20px 20px 20px; display: flex; flex-direction: column; gap: 16px; }
    .item { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px dashed var(--item-border); transition: border-color 0.3s; }
    .items-list .item:first-child { border-top: none; padding-top: 0; }
    
    .item-content-wrapper { flex: 1; padding-right: 15px; min-width: 0; }
    .item-name { font-size: 15px; color: var(--text-primary); outline: none; word-wrap: break-word; overflow-wrap: break-word; transition: color 0.3s; }
    .item-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; font-family: 'Inter', sans-serif; outline: none; word-wrap: break-word; overflow-wrap: break-word; line-height: 1.4; transition: color 0.3s; }
    
    .price {
        background: var(--price-bg);
        color: var(--accent-color);
        padding: 6px 12px; border-radius: 12px; font-size: 14px; font-weight: 600;
        white-space: nowrap; outline: none; flex-shrink: 0; transition: background 0.3s;
    }
    .price::after { content: ' ₴'; }

    .footer-links { margin-top: 30px; display: flex; flex-direction: column; gap: 10px; }
    .link-card {
        background: var(--surface-color); padding: 16px 20px; border-radius: var(--border-radius);
        display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text-primary);
        font-size: 15px; font-weight: 600; outline: none; transition: background-color 0.3s, color 0.3s;
    }

    .vsht-footer {
        display: flex; align-items: center; justify-content: center; gap: 12px;
        margin-top: 40px; font-family: 'Inter', sans-serif; font-size: 12px;
        color: var(--text-secondary); letter-spacing: 1px; transition: color 0.3s;
    }
    .footer-divider { opacity: 0.3; }
    .write-us {
        display: flex; align-items: center; gap: 6px; color: var(--text-secondary); text-decoration: none; opacity: 0.7;
    }
    .write-us .material-symbols-rounded { font-size: 14px; color: var(--text-secondary); }

    /* ===================== КНОПКИ АДМІНКИ ===================== */

    .admin-add-item-btn, #add-section-btn {
        background: rgba(255, 255, 255, 0.05); color: #888;
        border: 1px dashed #444; border-radius: 12px; font-family: 'Inter', sans-serif;
        padding: 12px; text-align: center; cursor: pointer;
        display: none; width: calc(100% - 40px); margin: 0 auto 20px auto;
    }
    #add-section-btn {
        width: 100%; margin-top: 10px; border-color: var(--accent-color); color: var(--accent-color);
        font-weight: bold; background: rgba(222, 255, 154, 0.05);
    }

    /* ===================== ЕКСПОРТ ===================== */

    #export-btn {
        position: fixed; bottom: 20px; right: 20px; background: #fff; color: #000;
        border: none; padding: 15px 20px; border-radius: 30px; font-family: 'Inter', sans-serif;
        font-weight: 600; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); display: none; z-index: 1000;
    }
    #export-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 2000; padding: 20px; flex-direction: column;
    }
    #export-textarea {
        width: 100%; height: 80%; background: #111; color: #0f0; font-family: monospace;
        padding: 10px; border: 1px solid #333; border-radius: 10px; margin-bottom: 20px;
    }
    #close-overlay { background: #fff; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; }

    /* ===================== ПАНЕЛЬ НАЛАШТУВАНЬ ===================== */

    #settings-panel {
        display: none; position: fixed; top: 80px; right: 20px;
        background: var(--settings-bg);
        border: 1px solid var(--settings-border);
        border-radius: 15px; padding: 15px; z-index: 100;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 230px;
        transition: background 0.3s, border-color 0.3s;
    }
    .settings-label {
        font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; margin-top: 15px;
        font-family: 'Inter', sans-serif;
    }
    .settings-label:first-child { margin-top: 0; }
    
    .settings-panel select {
        width: 100%; padding: 8px; border-radius: 8px; border: none;
        background: var(--item-border); color: var(--text-primary);
        font-family: 'Inter', sans-serif;
    }

    /* ===================== ПЕРЕМИКАЧ ТЕМ ===================== */

    .theme-switcher {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
    }

    .theme-btn {
        border: none;
        border-radius: 10px;
        padding: 8px 4px;
        cursor: pointer;
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        font-weight: 600;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        transition: transform 0.15s, box-shadow 0.15s;
    }
    .theme-btn:hover { transform: scale(1.05); }
    .theme-btn.active { box-shadow: 0 0 0 2px var(--accent-color); }

    .theme-btn[data-theme="dark"] {
        background: #1E1E1E;
        color: #FFFFFF;
    }
    .theme-btn[data-theme="light"] {
        background: #F5F5F3;
        color: #111111;
    }
    .theme-btn[data-theme="kraft"] {
        background: #241910;
        color: #F0DFC0;
    }

    .theme-dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
    }
    .theme-btn[data-theme="dark"] .theme-dot { background: #DEFF9A; }
    .theme-btn[data-theme="light"] .theme-dot { background: #111; border: 1px solid #ccc; }
    .theme-btn[data-theme="kraft"] .theme-dot { background: #C8965A; }

    /* Палітра кольорів */
    .palette-grid {
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    }
    .color-swatch {
        width: 35px; height: 35px; border-radius: 50%; cursor: pointer;
        border: 2px solid transparent; transition: transform 0.2s;
    }
    .color-swatch:hover { transform: scale(1.15); }
</style>


</head>
<body>


<div class="main-content">
    <div class="header">
        <div class="header-info">
            <img src="https://via.placeholder.com/100" alt="Logo" class="logo" id="business-logo">
            <div class="business-name editable">Назва Бізнесу</div>
        </div>
        <button class="action-btn" id="admin-dots">
            <span class="material-symbols-rounded" style="color: #fff;">settings</span>
        </button>
    </div>

    <div id="settings-panel" class="settings-panel">

        <div class="settings-label">Тема оформлення</div>
        <div class="theme-switcher">
            <button class="theme-btn active" data-theme="dark">
                <div class="theme-dot"></div>
                Темна
            </button>
            <button class="theme-btn" data-theme="light">
                <div class="theme-dot"></div>
                Світла
            </button>
            <button class="theme-btn" data-theme="kraft">
                <div class="theme-dot"></div>
                Kraft
            </button>
        </div>

        <div class="settings-label">Шрифт сторінки</div>
        <select id="font-selector">
            <option value="'Unbounded', sans-serif">Unbounded (Модерн)</option>
            <option value="'Montserrat', sans-serif">Montserrat (Класика)</option>
            <option value="'Montserrat Alternates', sans-serif">Mont. Alternates (Фан)</option>
            <option value="'Inter', sans-serif">Inter (Чистий)</option>
            <option value="'Inter Tight', sans-serif">Inter Tight</option>
            <option value="'Roboto Flex', sans-serif">Roboto Flex</option>
            <option value="'Mulish', sans-serif">Mulish</option>
            <option value="'Arimo', sans-serif">Arimo</option>
            <option value="'Cormorant', serif">Cormorant (Естетика)</option>
            <option value="'Prata', serif">Prata (Фешн)</option>
            <option value="'Marmelad', sans-serif">Marmelad</option>
        </select>

        <div class="settings-label">Кольорова палітра</div>
        <div class="palette-grid" id="palette-container"></div>
    </div>


<!--ТУТ--> 


    <div class="section-title editable">
        <span class="material-symbols-rounded">menu_book</span>
        Асортимент
    </div>

    <div id="menu-wrapper">
        <details open>
            <summary class="editable">Приклад Категорії</summary>
            <div class="items-list">
                <div class="item">
                    <div class="item-content-wrapper">
                        <div class="item-name editable">Назва позиції</div>
                        <div class="item-desc editable">Опис позиції (можна стерти)</div>
                    </div>
                    <div class="price editable">0</div>
                </div>
            </div>
            <button class="admin-add-item-btn">+ Додати позицію</button>
        </details>
    </div>
    
    <button id="add-section-btn">+ ДОДАТИ НОВИЙ РОЗДІЛ</button>

    <div class="footer-links">
        <a href="tel:+380990000000" class="link-card editable">
            <span class="material-symbols-rounded">call</span>
            Зателефонувати
        </a>
        <a href="https://maps.google.com" target="_blank" class="link-card editable">
            <span class="material-symbols-rounded">location_on</span>
            Валки, вул. Центральна 1
        </a>
    </div>
</div>


<!--КІНЕЦЬ--> 


<div class="vsht-footer">
    <span>ВШТ • РЕКЛАМА</span>
    <span class="footer-divider">•</span>
    <a href="https://t.me/valkysho_bot" target="_blank" class="write-us">
        <span class="material-symbols-rounded">chat_bubble</span>
        Написати
    </a>
</div>

<button id="export-btn">ЗБЕРЕГТИ КОД</button>

<div id="export-overlay">
    <textarea id="export-textarea"></textarea>
    <button id="close-overlay">ЗАКРИТИ ТА ПОВЕРНУТИСЬ</button>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const tgStartParam = window.Telegram?.WebApp?.initDataUnsafe?.start_param;
    const isAdmin = urlParams.get('admin') === 'boss' || tgStartParam === 'adminboss';

    if (isAdmin) {
        const adminDots = document.getElementById('admin-dots');
        const settingsPanel = document.getElementById('settings-panel');
        const fontSelector = document.getElementById('font-selector');
        const logo = document.getElementById('business-logo');
        
        adminDots.style.display = 'flex';
        document.getElementById('export-btn').style.display = 'block';
        document.getElementById('add-section-btn').style.display = 'block';
        
        // ——— ТЕМИ ———
        const themeBtns = document.querySelectorAll('.theme-btn');
        themeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const theme = btn.dataset.theme;
                document.documentElement.setAttribute('data-theme', theme);
                themeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // ——— ПАЛІТРА ———
        const colors = [
            '#DEFF9A', '#D4C4FB', '#FFB5A7', '#FDF0D5',
            '#A8DADC', '#FFCB77', '#FFFFFF', '#D4AF37'
        ];

        const paletteContainer = document.getElementById('palette-container');
        colors.forEach(c => {
            let swatch = document.createElement('div');
            swatch.className = 'color-swatch';
            swatch.style.backgroundColor = c;
            swatch.onclick = () => document.documentElement.style.setProperty('--accent-color', c);
            paletteContainer.appendChild(swatch);
        });

        // ——— EDITABLE ———
        function makeEditable(nodes) {
            nodes.forEach(el => {
                el.setAttribute('contenteditable', 'true');
                el.style.borderBottom = '1px dashed #555'; 
            });
        }

        makeEditable(document.querySelectorAll('.editable'));
        document.querySelectorAll('.admin-add-item-btn').forEach(btn => btn.style.display = 'block');

        adminDots.addEventListener('click', () => {
            settingsPanel.style.display = settingsPanel.style.display === 'block' ? 'none' : 'block';
        });

        fontSelector.addEventListener('change', (e) => {
            document.documentElement.style.setProperty('--font-main', e.target.value);
        });

        logo.addEventListener('click', () => {
            const newUrl = prompt("Вставте посилання на нове лого:", logo.src);
            if (newUrl) logo.src = newUrl;
        });

        // ——— ДОДАТИ ПОЗИЦІЮ ———
        document.addEventListener('click', function(e) {
            if (e.target && e.target.className === 'admin-add-item-btn') {
                const itemsList = e.target.previousElementSibling;
                const newItem = document.createElement('div');
                newItem.className = 'item';
                newItem.innerHTML = `
                    <div class="item-content-wrapper">
                        <div class="item-name editable">Нова позиція</div>
                        <div class="item-desc editable">Опис</div>
                    </div>
                    <div class="price editable">0</div>
                `;
                itemsList.appendChild(newItem);
                makeEditable(newItem.querySelectorAll('.editable'));
            }
        });

        // ——— ДОДАТИ РОЗДІЛ ———
        document.getElementById('add-section-btn').addEventListener('click', () => {
            const wrapper = document.getElementById('menu-wrapper');
            const newDetails = document.createElement('details');
            newDetails.open = true;
            newDetails.innerHTML = `
                <summary class="editable">Новий Розділ</summary>
                <div class="items-list">
                    <div class="item">
                        <div class="item-content-wrapper">
                            <div class="item-name editable">Нова позиція</div>
                            <div class="item-desc editable">Опис</div>
                        </div>
                        <div class="price editable">0</div>
                    </div>
                </div>
                <button class="admin-add-item-btn" style="display: block;">+ Додати позицію</button>
            `;
            wrapper.appendChild(newDetails);
            makeEditable(newDetails.querySelectorAll('.editable'));
        });

        // ——— ЕКСПОРТ ———
        document.getElementById('export-btn').addEventListener('click', () => {
            settingsPanel.style.display = 'none';
            let cleanDOM = document.documentElement.cloneNode(true);
            
            cleanDOM.querySelectorAll('.editable').forEach(el => {
                el.removeAttribute('contenteditable');
                el.style.borderBottom = '';
            });
            cleanDOM.querySelector('#admin-dots').style.display = 'none';
            cleanDOM.querySelector('#export-btn').style.display = 'none';
            cleanDOM.querySelector('#settings-panel').style.display = 'none';
            cleanDOM.querySelector('#export-overlay').style.display = 'none';
            cleanDOM.querySelectorAll('.admin-add-item-btn, #add-section-btn').forEach(btn => btn.style.display = 'none');
            
            let finalHTML = "<!DOCTYPE html>\n" + cleanDOM.outerHTML;
            
            document.getElementById('export-overlay').style.display = 'flex';
            document.getElementById('export-textarea').value = finalHTML;
        });

        document.getElementById('close-overlay').addEventListener('click', () => {
            document.getElementById('export-overlay').style.display = 'none';
        });
    }
</script>


</body>
</html>
